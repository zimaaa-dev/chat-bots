{% extends "base.html" %}

{% block content %}
<div class="text-center">
    <div class="question-box">
        <h2 class="text-success mb-4">Опрос завершен!</h2>
        
        {% if config.REQUEST_FILENAME %}
        <p class="lead">{{ config.FILENAME_MESSAGE }}</p>
        <div class="alert alert-success">
            Результаты сохранены автоматически
        </div>
        {% else %}
        <p class="lead">{{ config.FILENAME_ID_MESSAGE }}</p>
        {% endif %}
        
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-primary btn-custom">Пройти опрос еще раз</a>
        </div>
    </div>
</div>
{% endblock %}
